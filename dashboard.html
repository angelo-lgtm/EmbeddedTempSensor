<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Temperature Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        :root {
            --bg-color: #050508;
            --card-bg: rgba(10, 11, 20, 0.8);
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --text-main: #ffffff;
            --text-dim: #8b8c9e;
            --border-glow: rgba(0, 243, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(0, 243, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(57, 255, 20, 0.05) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            animation: containerEntry 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerEntry {
            from {
                opacity: 0;
                transform: translateY(30px);
                filter: blur(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
        }

        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(57, 255, 20, 0.2);
            background: rgba(57, 255, 20, 0.05);
            margin-bottom: 35px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 12px;
            background-color: var(--neon-green);
            box-shadow: 0 0 10px var(--neon-green);
            animation: neonPulse 2s infinite;
        }

        @keyframes neonPulse {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.1);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .sensor-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .sensor-card:hover {
            border-color: rgba(0, 243, 255, 0.3);
            transform: scale(1.02);
        }

        .label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .value-box {
            display: flex;
            align-items: baseline;
            justify-content: center;
            margin-bottom: 5px;
        }

        .value {
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--text-main);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .unit {
            font-size: 1.5rem;
            color: var(--neon-blue);
            margin-left: 5px;
            font-weight: 600;
        }

        .timestamp {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 30px;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Temp Monitor</h1>

        <div id="connection-status" class="status-badge">
            <span class="status-dot"></span>
            <span id="status-text">Connected to Broker</span>
        </div>

        <div class="sensor-card">
            <div class="label">Current Temperature</div>
            <div class="value-box">
                <span id="temperature" class="value">--</span>
                <span class="unit">°C</span>
            </div>
            <div class="timestamp">UPDATED: <span id="last-update">--</span></div>
        </div>
    </div>

    <script>
        const YOUR_NAME = "Angelo";
        const MQTT_BROKER = "ws://broker.benax.rw:9001";
        const TOPIC_DATA = `sensor_${YOUR_NAME}`;

        const tempVal = document.getElementById('temperature');
        const updateTime = document.getElementById('last-update');
        const statusText = document.getElementById('status-text');

        const client = mqtt.connect(MQTT_BROKER);

        client.on('connect', () => {
            statusText.innerText = 'System Online';
            client.subscribe(TOPIC_DATA);
        });

        client.on('message', (topic, message) => {
            const payload = message.toString();
            if (topic === TOPIC_DATA) {
                try {
                    const data = JSON.parse(payload);
                    tempVal.innerText = data.temperature;
                } catch (e) {
                    tempVal.innerText = payload;
                }
                updateTime.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }
        });

        client.on('offline', () => { statusText.innerText = 'Scanner Offline'; });
        client.on('error', (err) => { statusText.innerText = 'Network Error'; });
    </script>
</body>

</html>
